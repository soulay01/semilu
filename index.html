async function dec(p){
const pwInput=new TextEncoder().encode("pbkdf2"+p+"yesnt");
const mk=await crypto.subtle.digest("SHA-256",pwInput);
const k=await crypto.subtle.importKey("raw",mk,"PBKDF2",false,["deriveKey"]);
const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:Uint8Array.from(atob(d.s),c=>c.charCodeAt(0)),iterations:100000,hash:"SHA-512"},k,{name:"AES-GCM",length:256},false,["decrypt"]);
try{const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:Uint8Array.from(atob(d.i),c=>c.charCodeAt(0))},key,Uint8Array.from(atob(d.c),c=>c.charCodeAt(0)));return new TextDecoder().decode(pt)}catch(e){return null}
}

document.getElementById('go').onclick=async()=>{
const p=document.getElementById('pw').value;
const pt=await dec(p);
if(pt){
document.getElementById('pwbox').style.display='none';
const ta=document.getElementById('code');
ta.value=pt;
ta.style.display='block';
}else{
document.getElementById('err').style.display='block';
}
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click()});
